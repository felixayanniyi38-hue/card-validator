<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardVerify</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* MAIN CARD */
.container {
  width: 380px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 25px;
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  text-align: center;
}

/* TITLE */
h1 {
  font-size: 22px;
  margin-bottom: 5px;
}

.sub {
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 20px;
}

/* ICONS */
.icons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 15px;
}

.icons img {
  width: 55px;
  opacity: 0.2;
  filter: grayscale(100%);
  transition: 0.3s;
}

.icons img.active {
  opacity: 1;
  filter: none;
  transform: scale(1.1);
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 14px;
  margin-bottom: 12px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #22c55e, #16a34a);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.02);
}

/* RESULT */
.result {
  margin-top: 15px;
  font-weight: bold;
}

/* FOOTER */
.footer {
  margin-top: 15px;
  font-size: 10px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="container">

  <h1>CardVerify</h1>
  <div class="sub">Secure Card Validation Tool</div>

  <div class="icons">
    <img id="visa" src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg">
    <img id="mastercard" src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">
  </div>

  <input type="text" id="cardNumber" placeholder="Enter card number">

  <button onclick="validateCard()">Validate Card</button>

  <div class="result" id="result"></div>

  <div class="footer">
    Educational tool only. No data is stored or transmitted.
  </div>

</div>

<script>
document.getElementById("cardNumber").addEventListener("input", function(e) {
  let value = e.target.value.replace(/\D/g, "").substring(0,16);
  let formatted = value.match(/.{1,4}/g);
  e.target.value = formatted ? formatted.join(" ") : value;
});

function validateCard() {
  let num = document.getElementById("cardNumber").value.replace(/\s/g, "");
  let result = document.getElementById("result");

  // reset icons
  document.getElementById("visa").classList.remove("active");
  document.getElementById("mastercard").classList.remove("active");

  let sum = 0;
  let shouldDouble = false;

  for (let i = num.length - 1; i >= 0; i--) {
    let digit = parseInt(num[i]);

    if (shouldDouble) {
      digit *= 2;
      if (digit > 9) digit -= 9;
    }

    sum += digit;
    shouldDouble = !shouldDouble;
  }

  let isValid = (sum % 10 === 0);

  let let type = "Unknown";

if (/^4/.test(num)) {
  type = "Visa";
}
else if (/^5[1-5]/.test(num)) {
  type = "MasterCard";
}
else if (/^3[47]/.test(num)) {
  type = "American Express";
}
else if (/^6/.test(num)) {
  type = "Discover";
}
  }

  result.innerHTML = isValid
    ? `✅ Valid Card <br><small>${type}</small>`
    : `❌ Invalid Card`;
}
</script>

</body>
</html>
