<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardVerify</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.valid {
  color: #22c55e;
  text-shadow: 0 0 10px #22c55e;
}

.invalid {
  color: #ef4444;
}
  
.card {
  width: 360px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 25px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  text-align: center;
}

h1 {
  margin-bottom: 5px;
  font-size: 22px;
}

p.subtitle {
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  margin-bottom: 12px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.result {
  margin-top: 15px;
  font-weight: bold;
}

.loading {
  display: none;
  margin-top: 10px;
  font-size: 12px;
  color: #cbd5e1;
}

.footer {
  margin-top: 15px;
  font-size: 10px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="card">
  <h1>CardVerify</h1>
  <p class="subtitle">Secure Card Number Validator</p>

  <input type="text" id="cardNumber" placeholder="Enter card number">

  <button onclick="validateCard()">Validate</button>

  <div class="loading" id="loading">Checking card...</div>

  <div class="result" id="result"></div>

  <div class="footer">
    This tool only checks card number structure. No data is stored or transmitted.
  </div>
</div>

<script>
function validateCard() {
  let num = document.getElementById("cardNumber").value.replace(/\s/g, "");
  let result = document.getElementById("result");
  let loading = document.getElementById("loading");
if (isValid) {
  result.className = "result valid";
} else {
  result.className = "result invalid";
}
  if (!num) {
    result.innerHTML = "Please enter a card number";
    return;
  }
document.getElementById("cardNumber").addEventListener("input", function(e) {
  let value = e.target.value.replace(/\D/g, "").substring(0,16);
  let formatted = value.match(/.{1,4}/g);
  e.target.value = formatted ? formatted.join(" ") : value;
});
  result.innerHTML = "";
  loading.style.display = "block";

  setTimeout(() => {
    let sum = 0;
    let shouldDouble = false;

    for (let i = num.length - 1; i >= 0; i--) {
      let digit = parseInt(num[i]);

      if (shouldDouble) {
        digit *= 2;
        if (digit > 9) digit -= 9;
      }

      sum += digit;
      shouldDouble = !shouldDouble;
    }

    let isValid = (sum % 10 === 0);

    let type = "Unknown";
    if (/^4/.test(num)) type = "Visa";
    else if (/^5[1-5]/.test(num)) type = "MasterCard";
    else if (/^3[47]/.test(num)) type = "American loading.innerText = "🔍 Checking card...";
loading.innerText = "🔍 Checking card...";
    result.innerHTML = isValid
      ? `✅ Valid Card<br><small>${type}</small>`
      : `❌ Invalid Card`;
  }, 1200);
}
</script>

</body>
</html>
